project:
  name: "{name}"
  repo: "{repo}"

guidance: true

adapters:
  create:
    skeleton:
      mode: sync
      script: gtms/adapters/create-skeleton.sh
  prime:
    manual-prime:
      mode: sync
      script: gtms/adapters/manual-prime.sh
      framework: manual
  execute:
    manual-execute:
      mode: sync
      script: gtms/adapters/manual-execute.sh
      framework: manual

defaults:
  create: skeleton
  prime: manual-prime
  execute: manual-execute
